<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dream Blueprint</title>
  <style>
    :root {
      --bg-main: #121214;
      --bg-top: #17161a;
      --bg-card: #1a1a1f;
      --border: #2a2a31;

      --text-main: #f3eee7;
      --text-soft: #a79f98;
      --text-muted: #6f6965;

      --his-accent: #b85c4b;
      --hers-accent: #8d6a86;
      --shared-accent: #c8a98d;

      --success: #7da88b;
      --warning: #c59a5b;
      --empty: #4f4b48;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
  background: linear-gradient(180deg, #141418 0%, #101014 100%);
  color: var(--text-main);
  font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

    body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.008) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.008) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.14;
}

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-sub {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff8f1, #cab8a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-desc {
      font-size: 14px;
      color: var(--text-soft);
      margin-top: 10px;
      line-height: 1.45;
    }

    .toggle-wrap {
      display: flex;
      max-width: 340px;
      margin: 0 auto 32px;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 4px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--text-muted);
    }

    .toggle-btn.active-his {
      background: rgba(184,92,75,0.18);
      color: #fff4ef;
      box-shadow: inset 0 0 0 1px rgba(184,92,75,0.25);
    }

    .toggle-btn.active-hers {
      background: rgba(141,106,134,0.18);
      color: #fbf4fb;
      box-shadow: inset 0 0 0 1px rgba(141,106,134,0.25);
    }

    .progress-wrap {
      margin-bottom: 36px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
      box-shadow: 0 0 16px rgba(255,255,255,0.08);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cat-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.008));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 16px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.14);
  backdrop-filter: blur(6px);
}

    .cat-card:active {
      transform: scale(0.98);
    }

    .cat-card.done-his {
      background: linear-gradient(180deg, rgba(184,92,75,0.11), rgba(184,92,75,0.05));
      border-color: rgba(184,92,75,0.22);
    }

    .cat-card.done-hers {
      background: linear-gradient(180deg, rgba(141,106,134,0.12), rgba(141,106,134,0.05));
      border-color: rgba(141,106,134,0.22);
    }

    .cat-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .cat-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .cat-count {
      font-size: 11px;
      color: var(--text-soft);
      line-height: 1.4;
    }

    .cat-check {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 14px;
    }

    .cat-mini-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      opacity: 0.75;
      transition: width 0.4s ease;
      border-radius: 999px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-soft);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 20px;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .form-header-icon {
      font-size: 36px;
    }

    .form-header h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
      color: var(--text-main);
    }

    .form-header-person {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .field-textarea {
      width: 100%;
      background: rgba(7,7,9,0.55);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text-main);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .field-textarea::placeholder {
      color: #59534f;
    }

    .field-textarea.has-value-his {
      border-color: rgba(184,92,75,0.22);
    }

    .field-textarea.has-value-hers {
      border-color: rgba(141,106,134,0.22);
    }

    .complete-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .complete-btn:active {
      opacity: 0.85;
      transform: scale(0.99);
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 16px 60px;
      }

      .header h1 {
        font-size: 28px;
      }

      .cat-grid {
        gap: 8px;
      }

      .cat-card {
        padding: 16px 12px;
      }

      .form-card {
        padding: 24px 16px;
      }

      .toggle-btn {
        letter-spacing: 1.5px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const categories = [
      {
        id: "car",
        icon: "🏎️",
        title: "Dream Car",
        questions: [
          { id: "make", label: "Make & Model", placeholder: "e.g. Porsche 911 GT3" },
          { id: "year", label: "Year", placeholder: "e.g. 2026" },
          { id: "color", label: "Exterior Color", placeholder: "e.g. Guards Red" },
          { id: "interior", label: "Interior", placeholder: "e.g. Black leather, carbon fiber trim" },
          { id: "features", label: "Must Have Features", placeholder: "e.g. Manual, sport exhaust, ceramic brakes" },
          { id: "second", label: "Second Car?", placeholder: "e.g. Blacked out Escalade for daily" }
        ]
      },
      {
        id: "house",
        icon: "🏠",
        title: "Dream House",
        questions: [
          { id: "location", label: "Location / City", placeholder: "e.g. Metairie, LA or Scottsdale, AZ" },
          { id: "sqft", label: "Square Footage", placeholder: "e.g. 3,500 sq ft" },
          { id: "bedrooms", label: "Bedrooms", placeholder: "e.g. 4" },
          { id: "bathrooms", label: "Bathrooms", placeholder: "e.g. 3.5" },
          { id: "style", label: "Style / Aesthetic", placeholder: "e.g. Modern farmhouse, dark tones" },
          { id: "musthaves", label: "Non Negotiable Features", placeholder: "e.g. Home gym, smart home, pool, fireplace" },
          { id: "garage", label: "Garage / Outdoor", placeholder: "e.g. 3 car garage, covered patio, outdoor kitchen" }
        ]
      },
      {
        id: "routine",
        icon: "⏰",
        title: "Dream Daily Routine",
        questions: [
          { id: "wake", label: "What Time Do You Wake Up?", placeholder: "e.g. 6:00 AM naturally, no alarm" },
          { id: "morning", label: "First 2 Hours Look Like...", placeholder: "e.g. Coffee on the patio, journal, gym" },
          { id: "work", label: "What Does Work Look Like?", placeholder: "e.g. 4 focused hours coaching clients from home office" },
          { id: "afternoon", label: "Afternoon", placeholder: "e.g. Golf, errands, content creation" },
          { id: "evening", label: "Evening Routine", placeholder: "e.g. Cook dinner together, unwind, read" },
          { id: "feeling", label: "How Do You FEEL At The End Of The Day?", placeholder: "e.g. Fulfilled, zero stress, excited for tomorrow" }
        ]
      },
      {
        id: "travel",
        icon: "✈️",
        title: "Dream Vacation / Travel",
        questions: [
          { id: "top3", label: "Top 3 Destinations", placeholder: "e.g. Bora Bora, Tokyo, Swiss Alps" },
          { id: "frequency", label: "How Often Are You Traveling?", placeholder: "e.g. One big trip per quarter" },
          { id: "style", label: "Travel Style", placeholder: "e.g. Luxury resort, private villa, adventure" },
          { id: "flight", label: "How Are You Flying?", placeholder: "e.g. First class, business minimum" },
          { id: "memory", label: "One Trip You'd Never Forget", placeholder: "e.g. 2 week Greece island hopping" }
        ]
      },
      {
        id: "income",
        icon: "💰",
        title: "Dream Income / Net Worth",
        questions: [
          { id: "monthly", label: "Monthly Income", placeholder: "e.g. $30,000/month" },
          { id: "networth", label: "Net Worth Goal", placeholder: "e.g. $2M by 35" },
          { id: "sources", label: "Income Sources", placeholder: "e.g. Coaching, investments, digital products" },
          { id: "freedom", label: "What Does Financial Freedom Mean To You?", placeholder: "e.g. Never checking the price of anything" }
        ]
      },
      {
        id: "business",
        icon: "📈",
        title: "Dream Business",
        questions: [
          { id: "name", label: "Business Name / Brand", placeholder: "e.g. Miguelly Online Fitness fully scaled" },
          { id: "clients", label: "How Many Clients / Revenue?", placeholder: "e.g. 40 active clients, $25K/month" },
          { id: "team", label: "Do You Have A Team?", placeholder: "e.g. VA, video editor, sales closer" },
          { id: "impact", label: "What Impact Does It Have?", placeholder: "e.g. Helping 500+ men transform their bodies and confidence" },
          { id: "day", label: "What Does A Work Day Look Like?", placeholder: "e.g. Check ins, 2 sales calls, content batch day" }
        ]
      },
      {
        id: "investments",
        icon: "🏦",
        title: "Dream Investments / Assets",
        questions: [
          { id: "portfolio", label: "What Do You Own?", placeholder: "e.g. 3 rental properties, index funds, business equity" },
          { id: "passive", label: "Monthly Passive Income", placeholder: "e.g. $5,000/month from rentals + dividends" },
          { id: "assets", label: "Big Assets", placeholder: "e.g. Land, commercial property, franchise" },
          { id: "strategy", label: "Investment Philosophy", placeholder: "e.g. Cash flow over appreciation, diversified" }
        ]
      },
      {
        id: "relationship",
        icon: "❤️",
        title: "Dream Relationship Dynamic",
        questions: [
          { id: "communication", label: "How Do You Two Communicate?", placeholder: "e.g. Direct, no passive aggression, weekly check ins" },
          { id: "roles", label: "How Do You Split Responsibilities?", placeholder: "e.g. Both contribute, play to strengths" },
          { id: "dates", label: "What Do Date Nights Look Like?", placeholder: "e.g. Try a new restaurant every Friday" },
          { id: "support", label: "How Do You Support Each Other's Goals?", placeholder: "e.g. She keeps me accountable, I support her career" },
          { id: "vibe", label: "One Word For The Energy You Want", placeholder: "e.g. Peaceful, passionate, unshakeable" }
        ]
      },
      {
        id: "family",
        icon: "👨‍👩‍👧‍👦",
        title: "Dream Family Setup",
        questions: [
          { id: "kids", label: "Kids? How Many?", placeholder: "e.g. 2, one boy, one girl" },
          { id: "timeline", label: "Timeline", placeholder: "e.g. First kid by 28" },
          { id: "parenting", label: "Parenting Style", placeholder: "e.g. Discipline + freedom, teach them money early" },
          { id: "traditions", label: "Family Traditions You Want", placeholder: "e.g. Sunday dinners, annual family trip" },
          { id: "values", label: "Top 3 Values You Want To Pass Down", placeholder: "e.g. Work ethic, respect, self reliance" }
        ]
      },
      {
        id: "physique",
        icon: "💪",
        title: "Dream Physique",
        questions: [
          { id: "weight", label: "Goal Weight", placeholder: "e.g. 205 lbs lean" },
          { id: "bodyfat", label: "Body Fat %", placeholder: "e.g. 10 to 12% year round" },
          { id: "look", label: "What Does It Look Like?", placeholder: "e.g. Full shoulders, thick back, visible abs" },
          { id: "strength", label: "Strength Goals", placeholder: "e.g. 315 bench, 500 deadlift" },
          { id: "energy", label: "How Do You FEEL Physically?", placeholder: "e.g. Explosive, no joint pain, sleeping 7 to 8 hrs" }
        ]
      },
      {
        id: "bucket",
        icon: "🎯",
        title: "Dream Bucket List",
        questions: [
          { id: "experience1", label: "Experience #1", placeholder: "e.g. Cage side at a UFC fight" },
          { id: "experience2", label: "Experience #2", placeholder: "e.g. Drive a Lamborghini on a track" },
          { id: "experience3", label: "Experience #3", placeholder: "e.g. Helicopter over the Grand Canyon" },
          { id: "experience4", label: "Experience #4", placeholder: "e.g. Meet Alex Hormozi" },
          { id: "experience5", label: "Experience #5", placeholder: "e.g. Own a beach house" }
        ]
      },
      {
        id: "future",
        icon: "🔮",
        title: "Dream Life At 40, 50, 60",
        questions: [
          { id: "at30", label: "At 30 You Are...", placeholder: "e.g. Business doing $30K/month, first rental property, starting a family" },
          { id: "at40", label: "At 40 You Are...", placeholder: "e.g. Multiple income streams, kids in sports, traveling quarterly" },
          { id: "at50", label: "At 50 You Are...", placeholder: "e.g. Semi retired, mentoring, in the best shape of your life" },
          { id: "at60", label: "At 60 You Are...", placeholder: "e.g. Generational wealth built, grandkids, legacy cemented" },
          { id: "legacy", label: "What Do People Say About You?", placeholder: "e.g. He built something real and never forgot where he came from" }
        ]
      }
    ];

    let person = "his";
    let activeCategory = null;
    let showResults = false;
    let answers = {};
    let completedCats = {};

    try {
      const saved = window.localStorage.getItem("dream-blueprint");
      if (saved) {
        const parsed = JSON.parse(saved);
        answers = parsed.answers || {};
        completedCats = parsed.completedCats || {};
      }
    } catch (e) {}

    function saveState() {
      try {
        window.localStorage.setItem(
          "dream-blueprint",
          JSON.stringify({ answers, completedCats })
        );
      } catch (e) {}
    }

    function getKey(catId, qId) {
      return `${person}-${catId}-${qId}`;
    }

    function getCatProgress(cat) {
      return cat.questions.filter(q => (answers[getKey(cat.id, q.id)] || '').trim()).length;
    }

    function getOverallProgress() {
      const total = categories.reduce((sum, cat) => sum + cat.questions.length, 0);
      const answered = categories.reduce((sum, cat) => sum + getCatProgress(cat), 0);
      return total ? Math.round((answered / total) * 100) : 0;
    }

    function getColor() {
      return person === "his" ? "var(--his-accent)" : "var(--hers-accent)";
    }

    function getLabel() {
      return person === "his" ? "HIS PRIVATE VISION" : "HER PRIVATE VISION";
    }

    function getPersonCategoryProgress(personKey, cat) {
      return cat.questions.filter(q => (answers[`${personKey}-${cat.id}-${q.id}`] || '').trim()).length;
    }

    function getPersonStartedCount(personKey) {
      return categories.filter(cat => getPersonCategoryProgress(personKey, cat) > 0).length;
    }

    function getCategoryStatus(cat) {
      const hisCount = getPersonCategoryProgress("his", cat);
      const herCount = getPersonCategoryProgress("hers", cat);

      if (hisCount > 0 && herCount > 0) return "both";
      if (hisCount > 0 || herCount > 0) return "one";
      return "none";
    }

    function countStatuses() {
      let both = 0;
      let one = 0;
      let none = 0;

      categories.forEach(cat => {
        const status = getCategoryStatus(cat);
        if (status === "both") both++;
        else if (status === "one") one++;
        else none++;
      });

      return { both, one, none };
    }

    function getMomentumMessage() {
      const { both, one, none } = countStatuses();

      if (both >= 8) return "You both have strong shared momentum. The foundation is already there.";
      if (both >= 4) return "You are building real overlap. A few more shared sections will make the picture much clearer.";
      if (one >= 4) return "There is movement here. One of you has started defining the future, now the other side needs to meet it.";
      if (none === categories.length) return "Nothing is locked in yet. That is okay. Start with one category and build from there.";
      return "You have early pieces on the board. Keep going until the shared picture feels real.";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function openResults() {
      activeCategory = null;
      showResults = true;
      render();
      window.scrollTo(0, 0);
    }

    function setPerson(p) {
      person = p;
      activeCategory = null;
      showResults = false;
      render();
      window.scrollTo(0, 0);
    }

    function openCategory(id) {
      activeCategory = id;
      showResults = false;
      render();
      window.scrollTo(0, 0);
    }

    function goBack() {
      activeCategory = null;
      showResults = false;
      render();
      window.scrollTo(0, 0);
    }

    function handleInput(catId, qId, value) {
      answers[getKey(catId, qId)] = value;
      saveState();
    }

    function markComplete(catId) {
      completedCats[`${person}-${catId}`] = true;
      saveState();
      activeCategory = null;
      showResults = false;
      render();
      window.scrollTo(0, 0);
    }

    function render() {
      const app = document.getElementById("app");
      const color = getColor();
      const label = getLabel();
      const progress = getOverallProgress();

      let html = `
        <div class="header">
          <div class="header-sub">Private reflections, shared future</div>
          <h1>DREAM BLUEPRINT</h1>
          <div class="header-desc">A calm space to dream honestly, reflect clearly, and build your future together on purpose.</div>
        </div>

        <div class="toggle-wrap">
          <button class="toggle-btn ${person === 'his' ? 'active-his' : ''}" onclick="setPerson('his')">HIS SPACE</button>
          <button class="toggle-btn ${person === 'hers' ? 'active-hers' : ''}" onclick="setPerson('hers')">HER SPACE</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-labels">
            <span>${label}</span>
            <span>${progress}% COMPLETE</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progress}%;background:${color}"></div>
          </div>
        </div>
      `;

      if (!activeCategory && !showResults) {
        html += `<div class="cat-grid">`;

        categories.forEach(cat => {
          const prog = getCatProgress(cat);
          const total = cat.questions.length;
          const doneKey = `${person}-${cat.id}`;
          const done = completedCats[doneKey];
          const doneClass = done ? (person === 'his' ? 'done-his' : 'done-hers') : '';

          html += `
            <div class="cat-card ${doneClass}" onclick="openCategory('${cat.id}')">
              <div class="cat-icon">${cat.icon}</div>
              <div class="cat-title">${cat.title}</div>
              <div class="cat-count">${prog}/${total} answered</div>
              ${done ? `<div class="cat-check" style="color:${color}">✓</div>` : ''}
              <div class="cat-mini-bar" style="width:${(prog / total) * 100}%;background:${color}"></div>
            </div>
          `;
        });

        html += `
          <div class="cat-card" onclick="openResults()">
            <div class="cat-icon">🤍</div>
            <div class="cat-title">Shared Results</div>
            <div class="cat-count">See the overlap without revealing every raw answer</div>
            <div class="cat-mini-bar" style="width:100%;background:var(--shared-accent)"></div>
          </div>
        `;

        html += `</div>`;
      } else if (showResults) {
        const hisStarted = getPersonStartedCount("his");
        const herStarted = getPersonStartedCount("hers");
        const { both, one, none } = countStatuses();

        html += `
          <button class="back-btn" onclick="goBack()">← Back to categories</button>

          <div class="form-card">
            <div class="form-header">
              <span class="form-header-icon">🤍</span>
              <div>
                <h2>Shared Results</h2>
                <div class="form-header-person" style="color:var(--shared-accent)">COUPLE OVERVIEW</div>
              </div>
            </div>

            <div class="form-fields">
              <div>
                <label class="field-label">Overall Completion</label>
                <div class="field-textarea">${progress}% complete</div>
              </div>

              <div>
                <label class="field-label">His Progress</label>
                <div class="field-textarea">${hisStarted}/${categories.length} categories started</div>
              </div>

              <div>
                <label class="field-label">Her Progress</label>
                <div class="field-textarea">${herStarted}/${categories.length} categories started</div>
              </div>

              <div>
                <label class="field-label">Shared Momentum</label>
                <div class="field-textarea">${getMomentumMessage()}</div>
              </div>
            </div>
          </div>
        `;

        html += `<div class="cat-grid" style="margin-top:16px;">`;

        html += `
          <div class="cat-card">
            <div class="cat-icon">✨</div>
            <div class="cat-title">Both Answered</div>
            <div class="cat-count">${both} categories</div>
            <div class="cat-mini-bar" style="width:100%;background:var(--success)"></div>
          </div>

          <div class="cat-card">
            <div class="cat-icon">🌗</div>
            <div class="cat-title">Needs Discussion</div>
            <div class="cat-count">${one} categories</div>
            <div class="cat-mini-bar" style="width:100%;background:var(--warning)"></div>
          </div>

          <div class="cat-card">
            <div class="cat-icon">🌙</div>
            <div class="cat-title">Not Started Yet</div>
            <div class="cat-count">${none} categories</div>
            <div class="cat-mini-bar" style="width:100%;background:var(--empty)"></div>
          </div>

          <div class="cat-card">
            <div class="cat-icon">🤝</div>
            <div class="cat-title">Shared Vision Mode</div>
            <div class="cat-count">Private answers, clearer alignment</div>
            <div class="cat-mini-bar" style="width:100%;background:var(--shared-accent)"></div>
          </div>
        `;

        html += `</div>`;

        html += `<div class="cat-grid" style="margin-top:16px;">`;

        categories.forEach(cat => {
          const status = getCategoryStatus(cat);

          let statusText = "Not started yet";
          let statusColor = "var(--empty)";

          if (status === "both") {
            statusText = "Both answered";
            statusColor = "var(--success)";
          } else if (status === "one") {
            statusText = "Needs discussion";
            statusColor = "var(--warning)";
          }

          html += `
            <div class="cat-card">
              <div class="cat-icon">${cat.icon}</div>
              <div class="cat-title">${cat.title}</div>
              <div class="cat-count">${statusText}</div>
              <div class="cat-mini-bar" style="width:100%;background:${statusColor}"></div>
            </div>
          `;
        });

        html += `</div>`;
      } else {
        const cat = categories.find(c => c.id === activeCategory);
        const hasValueClass = person === 'his' ? 'has-value-his' : 'has-value-hers';

        html += `
          <button class="back-btn" onclick="goBack()">← Back to categories</button>
          <div class="form-card">
            <div class="form-header">
              <span class="form-header-icon">${cat.icon}</span>
              <div>
                <h2>${cat.title}</h2>
                <div class="form-header-person" style="color:${color}">${label}</div>
              </div>
            </div>
            <div class="form-fields">
        `;

        cat.questions.forEach(q => {
          const key = getKey(cat.id, q.id);
          const val = answers[key] || '';
          const valClass = val.trim() ? hasValueClass : '';

          html += `
            <div>
              <label class="field-label">${q.label}</label>
              <textarea
                class="field-textarea ${valClass}"
                rows="2"
                placeholder="${q.placeholder}"
                oninput="handleInput('${cat.id}','${q.id}',this.value)"
                onfocus="this.style.borderColor='${color}'"
                onblur="this.style.borderColor=this.value.trim() ? '${person === 'his' ? 'rgba(184,92,75,0.22)' : 'rgba(141,106,134,0.22)'}' : 'rgba(255,255,255,0.06)'"
              >${escapeHtml(val)}</textarea>
            </div>
          `;
        });

        html += `
            </div>
            <button class="complete-btn" style="background:${color}" onclick="markComplete('${cat.id}')">SAVE THIS SECTION</button>
          </div>
        `;
      }

      html += `<div class="footer">TWO PERSPECTIVES, ONE SHARED DIRECTION</div>`;
      app.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
